<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);

            padding: 30px;
            border-radius: 15px;
            width: 400px;

            text-align: center;
            color: white;

            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        .btn-custom {
            background: #00c6ff;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0072ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="card">
    <h2> Password Analyzer</h2>

    <form method="POST">
        <input type="text" name="password" class="form-control mt-2" placeholder="Enter password" required>
        <input type="text" name="name" class="form-control mt-2" placeholder="Your name">
        <input type="text" name="birth" class="form-control mt-2" placeholder="Birth year">
        <input type="text" name="pet" class="form-control mt-2" placeholder="Pet name">

        <button class="btn btn-custom w-100 mt-3">Analyze</button>
    </form>

    {% if result %}
        <h4 style="color: {{color}};" class="mt-3">{{result}}</h4>

        <a href="/download">
            <button class="btn btn-success w-100 mt-2">Download Wordlist</button>
        </a>

        <img src="/graph" class="img-fluid mt-3">
    {% endif %}
</div>

<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01PASSWORDSECURE123";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
